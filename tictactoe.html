<!DOCTYPE html>
<html>

<head>
    <title>Tic Tac toe</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" charset="utf-8">
    <!-- <link rel="stylesheet" href="css/bootstrap.min.css"> -->
    <style>
        body {
            margin-top: 40px;
            background: #485b6e;
            color: #fff;
            font-family: Helvetica;
            font-weight: bold;
            text-align: center;
        }

        .container {
            margin: 0 auto;
            width: 600px;
        }

        #game {
            width: 300px;
            height: 300px;
            border: 1px solid #dadada;
            margin: 0 auto;
            padding: 0;
            margin-bottom: 20px;
        }

        #game>li {
            list-style: none;
            float: left;
            overflow: hidden;
            text-decoration: none;
            width: 100px;
            height: 100px;
            background: #f1f1f1;
            border: 1px solid #ccc;
            border-right: 1px solid #fff;
            cursor: pointer;
            text-transform: uppercase;
            text-align: center;
            padding-top: 20px;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
            font-size: 45px;

        }



        #game>li:hover {
            background: rgb(220, 228, 228);
            box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
        }

        #game>li:active {
            width: 100px;
            height: 100px;
            border: 0;
            background: rgb(220, 228, 228);
            box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;

        }


        #reset-game {
            text-align: center;
            border: none;
            padding: 0.6em 1.2em;
            background: #ed4e6e;
            color: #fff;
            font-size: 1em;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            display: inline-block;
            margin: 3px 2px;
            border-radius: 2px;
        }

        #reset-game:hover {
            background: #2c3e52;
        }
    </style>

</head>


<body>
    <div class="container">
        <h1>&#128512; &#128512; Enjoy this Game &#128512; &#128512;</h1><br><br>
        <h2>Player1 :- O</h2>
        <h2>Player2 :- X</h2>
        <ul id="game">
            <!-- first row -->
            <li id="1" onclick="show(this.id);"></li>
            <li id="2" onclick="show(this.id);"></li>
            <li id="3" onclick="show(this.id);"></li>
            <!-- second row -->
            <li id="4" onclick="show(this.id);"></li>
            <li id="5" onclick="show(this.id);"></li>
            <li id="6" onclick="show(this.id);"></li>
            <!-- third row -->
            <li id="7" onclick="show(this.id);"></li>
            <li id="8" onclick="show(this.id);"></li>
            <li id="9" onclick="show(this.id);"></li>
        </ul>
        <div id="result" style="width:300px ;height:100px; margin:auto; color:white; font-size:30px"> Wait for result...
        </div><br>
        <button id="reset-game" onclick="location.reload();">Reset Game</button>

        <!-- Game Messages -->

    </div>

    <script>
        let run = 1;

        function show(control) {
            if (run <= 9) {
                let control1 = document.getElementById(control)
                if(!control1.innerHTML){
                if (run % 2 == 0) {
                    document.getElementById(control).innerHTML = "X";
                    document.getElementById(control).style.color = "red";
                    // document.getElementById(control).style.display = "block";
                } else {
                    document.getElementById(control).innerHTML = "O";

                    document.getElementById(control).style.color = "green";
                    // document.getElementById(control).style.display = "block";
                }
                check();


                run++;
                }
                
            }

        }

        function check() {
            let c1 = document.getElementById("1").innerHTML;
            let c2 = document.getElementById("2").innerHTML;
            let c3 = document.getElementById("3").innerHTML;
            let c4 = document.getElementById("4").innerHTML;
            let c5 = document.getElementById("5").innerHTML;
            let c6 = document.getElementById("6").innerHTML;
            let c7 = document.getElementById("7").innerHTML;
            let c8 = document.getElementById("8").innerHTML;
            let c9 = document.getElementById("9").innerHTML;


            let s1 = document.getElementById("1").innerHTML != "";
            let s2 = document.getElementById("2").innerHTML != "";
            let s3 = document.getElementById("3").innerHTML != "";
            let s4 = document.getElementById("4").innerHTML != "";
            let s5 = document.getElementById("5").innerHTML != "";
            let s6 = document.getElementById("6").innerHTML != "";
            let s7 = document.getElementById("7").innerHTML != "";
            let s8 = document.getElementById("8").innerHTML != "";
            let s9 = document.getElementById("9").innerHTML != "";

            if (s1 && s2 && s3 && c1 === c2 && c2 === c3 && c1 === c3 || s1 && s4 && s7 && c1 === c4 && c4 === c7 &&
                c1 === c7 ||
                s3 && s6 && s9 && c3 === c6 && c6 === c9 && c3 === c9 || s7 && s8 && s9 && c7 === c8 && c8 === c9 &&
                c7 === c9 ||
                s2 && s5 && s8 && c2 === c5 && c5 === c8 && c2 === c8 || s4 && s5 && s6 && c4 === c5 && c5 === c6 &&
                c4 === c6 ||
                s1 && s5 && s9 && c1 === c5 && c5 === c9 && c1 === c9 || s3 && s5 && s7 && c3 === c5 && c5 === c7 &&
                c3 === c7) {
                if (run > 4) {
                    if (run % 2 != 0) {
                        document.getElementById("result").innerHTML = "O is win the match";
                        alert("O is win start the new game");
                        

                    } else {
                        document.getElementById("result").innerHTML = "X is win the match";
                        alert("X is win start the new game");
                    }
                }
            } else if (run === 9) {
                document.getElementById("result").innerHTML = "match Draw"
            }
        }
    </script>

</body>

</html>
